<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>樂力專案 — AI 工作流導入現況</title>
<style>
  :root{
    --navy:#0E2A47; --navy2:#14365C; --blue:#1F6FB8; --blueD:#184E7E;
    --cyan:#37C0E8; --ice:#CFE4F5; --panel:#F2F6FB; --panel2:#E5EEF7;
    --ink:#1B2A3A; --mute:#5E7186; --line:#D5E1EE; --amber:#E8943A; --amberD:#C2701E;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:"PingFang TC","Microsoft JhengHei","Noto Sans TC",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:#06121f;color:var(--ink);overflow:hidden;
  }
  /* stage keeps a fixed 16:9 deck, scaled to fit */
  #stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
  #deck{position:relative;width:1280px;height:720px;transform-origin:center center;
        box-shadow:0 30px 80px rgba(0,0,0,.5);background:#fff;border-radius:6px;overflow:hidden}
  .slide{position:absolute;inset:0;padding:64px 70px;opacity:0;visibility:hidden;
         transition:opacity .45s ease;background:#fff}
  .slide.active{opacity:1;visibility:visible}
  .slide.dark{background:var(--navy);color:#fff}

  /* typography helpers */
  .kicker{font-size:15px;font-weight:700;letter-spacing:2px;color:var(--blue);margin-bottom:8px}
  .kicker.on-dark{color:var(--cyan)}
  h1.title{font-size:34px;font-weight:800;color:var(--ink);line-height:1.15}
  .lead{font-size:16px;color:var(--mute);margin-top:10px}
  .pageno{position:absolute;right:34px;bottom:26px;font-size:13px;color:var(--mute)}
  .slide.dark .pageno{color:#5b7790}
  .chip{display:inline-block;background:var(--blue);color:#fff;font-weight:700;font-size:13px;
        letter-spacing:1px;padding:7px 16px;border-radius:4px}
  .accent-line{width:84px;height:3px;background:var(--cyan);border:none;margin:18px 0}
  .mono{font-family:"SFMono-Regular",Consolas,"Courier New",monospace}

  /* cover */
  .blob{position:absolute;border-radius:50%}
  .cover-title{font-size:80px;font-weight:800;line-height:1;margin-top:18px}
  .cover-sub{font-size:34px;color:var(--ice);margin-top:20px;font-weight:600}
  .cover-tags{font-size:18px;color:var(--ice);margin-top:14px;letter-spacing:1px}
  .cover-date{font-size:14px;color:#7d93a8;position:absolute;bottom:60px}

  /* agenda */
  .arow{display:flex;align-items:center;gap:26px;background:var(--panel);border-radius:8px;
        padding:22px 28px;margin-bottom:18px;border-left:5px solid var(--cyan);
        box-shadow:0 6px 16px rgba(14,42,71,.07)}
  .arow .num{font-size:42px;font-weight:800;color:var(--blue);min-width:70px;text-align:center}
  .arow h3{font-size:21px;color:var(--ink);margin-bottom:6px}
  .arow p{font-size:14px;color:var(--mute);line-height:1.5}

  /* stats */
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;margin-top:8px}
  .stat{background:var(--navy);border-radius:8px;padding:26px 18px;text-align:center;
        box-shadow:0 8px 20px rgba(14,42,71,.12)}
  .stat .big{font-size:52px;font-weight:800;color:var(--cyan);line-height:1}
  .stat .lab{font-size:16px;font-weight:700;color:#fff;margin-top:10px}
  .stat .sub{font-size:12px;color:var(--ice);margin-top:5px}
  .sec-head{font-size:16px;font-weight:700;color:var(--blue);margin:26px 0 12px}
  ul.clean{list-style:none}
  ul.clean li{position:relative;padding-left:22px;margin-bottom:11px;font-size:15px;line-height:1.55;color:var(--ink)}
  ul.clean li::before{content:"";position:absolute;left:2px;top:9px;width:8px;height:8px;
        border-radius:50%;background:var(--cyan)}
  .slide.dark ul.clean li{color:var(--ice)}

  /* divider */
  .div-num{font-size:150px;font-weight:800;color:var(--navy2);line-height:.8}

  /* project cards */
  .cards{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;margin-top:10px}
  .card{background:var(--panel);border-radius:8px;padding:26px 24px;
        box-shadow:0 8px 20px rgba(14,42,71,.08);border-top:5px solid var(--blue)}
  .card .code{font-size:19px;font-weight:800;margin-bottom:8px}
  .card .role{font-size:16px;font-weight:700;color:var(--ink);margin-bottom:10px}
  .card .hr{width:36px;height:2px;background:var(--line);margin-bottom:12px}
  .card p{font-size:13.5px;color:var(--mute);line-height:1.55}

  /* flow grid */
  .flowgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;margin-top:14px}
  .fcell{background:var(--panel);border-radius:8px;padding:22px 24px;box-shadow:0 6px 16px rgba(14,42,71,.07)}
  .fcell .fhead{display:flex;align-items:center;gap:14px;margin-bottom:12px}
  .fcell .badge{width:46px;height:46px;border-radius:50%;background:var(--blue);color:#fff;
        font-size:22px;font-weight:800;display:flex;align-items:center;justify-content:center}
  .fcell .ftitle{font-size:18px;font-weight:700;color:var(--ink)}
  .fcell p{font-size:13px;color:var(--mute);line-height:1.45}

  /* pipeline diagram */
  .pipe{display:flex;align-items:stretch;justify-content:center;gap:0;margin-top:56px}
  .pnode{flex:1;border-radius:10px;padding:18px 8px;text-align:center;
         box-shadow:0 8px 20px rgba(14,42,71,.12);position:relative}
  .pnode .pc{font-size:17px;font-weight:800;line-height:1.2}
  .pnode .ps{font-size:12px;margin-top:4px}
  .parrow{display:flex;align-items:center;justify-content:center;width:46px;color:var(--blue);
          font-size:24px;font-weight:800;position:relative}
  .parrow .albl{position:absolute;top:-34px;left:50%;transform:translateX(-50%);
        white-space:nowrap;font-size:11px;font-weight:600;color:var(--blue)}
  .feedback{margin-top:14px;text-align:center;font-size:13px;font-weight:700;color:var(--blueD)}
  .feedback .fbline{display:block;height:30px;border:2px solid var(--cyan);border-top:none;
        border-radius:0 0 10px 10px;margin:0 16% 8px;}

  /* two column tools panel */
  .tcols{display:grid;grid-template-columns:34% 1fr;gap:26px;margin-top:14px;height:430px}
  .tools{background:var(--navy);border-radius:8px;padding:26px 24px;color:#fff;box-shadow:0 8px 20px rgba(14,42,71,.12)}
  .tools h4{color:var(--cyan);font-size:17px;margin-bottom:14px}
  .tools .sublab{font-size:12px;font-weight:700;color:var(--ice);margin:10px 0 6px}
  .tools .toollist{font-size:12.5px;line-height:1.7}
  .tools .skill{font-family:Consolas,"Courier New",monospace;font-size:11.5px;line-height:1.8;color:#fff}
  .rstack{display:flex;flex-direction:column;gap:20px}
  .pbox{background:var(--panel);border-radius:8px;padding:20px 24px;box-shadow:0 6px 16px rgba(14,42,71,.07);flex:1}
  .pbox.chal{border-left:5px solid var(--amber)}
  .pbox.insi{border-left:5px solid var(--cyan)}
  .pbox h4{font-size:16px;margin-bottom:12px}
  .pbox.chal h4{color:var(--amberD)}
  .pbox.insi h4{color:var(--blue)}

  /* vertical steps */
  .vsteps{display:flex;flex-direction:column;gap:13px;margin-top:4px}
  .vstep{display:flex;align-items:center;gap:18px;background:var(--panel);border-radius:8px;
         padding:14px 22px;box-shadow:0 5px 14px rgba(14,42,71,.06)}
  .vstep .vb{width:38px;height:38px;border-radius:50%;background:var(--blue);color:#fff;
        font-weight:800;font-size:17px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .vstep span{font-size:15px;color:var(--ink)}

  /* generic grids */
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:14px}
  .ibox{background:var(--panel);border-radius:8px;padding:18px 22px;border-left:5px solid var(--cyan);
        box-shadow:0 6px 16px rgba(14,42,71,.07)}
  .ibox h4{font-size:15px;color:var(--ink);margin-bottom:7px}
  .ibox p{font-size:13px;color:var(--mute);line-height:1.5}
  .bigband{background:var(--panel);border-radius:8px;padding:18px 24px;border-left:5px solid var(--amber);
        box-shadow:0 6px 16px rgba(14,42,71,.07);margin-top:8px}
  .bigband h4{color:var(--amberD);font-size:16px;margin-bottom:8px}
  .bigband p{font-size:15px;color:var(--ink);line-height:1.5}
  .navy-band{background:var(--navy);color:#fff;border-radius:8px;padding:16px 24px;margin:14px 0;font-size:14px;line-height:1.5}
  .navy-band b{color:var(--cyan)}
  .dirbox{background:var(--navy);border-radius:8px;padding:24px;color:#fff;border-top:5px solid var(--cyan);
        box-shadow:0 8px 20px rgba(14,42,71,.12)}
  .dirbox h4{color:var(--cyan);font-size:18px;margin-bottom:12px}
  .dirbox p{font-size:14px;color:var(--ice);line-height:1.6}

  /* comparison table */
  table.cmp{width:100%;border-collapse:collapse;margin-top:16px;font-size:13.5px;
        box-shadow:0 8px 20px rgba(14,42,71,.1);border-radius:8px;overflow:hidden}
  table.cmp th{padding:16px 18px;color:#fff;text-align:left;font-weight:700}
  table.cmp th:nth-child(1){background:var(--navy)}
  table.cmp th:nth-child(2){background:var(--blue)}
  table.cmp th:nth-child(3){background:var(--blueD)}
  table.cmp td{padding:13px 18px;vertical-align:middle;border-bottom:1px solid var(--line)}
  table.cmp td:nth-child(1){background:var(--panel2);font-weight:700;color:var(--ink)}
  table.cmp td:nth-child(2){color:var(--blueD)}
  table.cmp td:nth-child(3){color:var(--mute)}
  table.cmp tr:nth-child(even) td:nth-child(2),
  table.cmp tr:nth-child(even) td:nth-child(3){background:var(--panel)}

  /* controls */
  #ui{position:fixed;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;
      gap:16px;padding:12px;z-index:30;pointer-events:none}
  #ui *{pointer-events:auto}
  .btn{background:rgba(20,54,92,.85);color:#cfe4f5;border:1px solid rgba(207,228,245,.25);
       width:40px;height:40px;border-radius:50%;font-size:18px;cursor:pointer;
       display:flex;align-items:center;justify-content:center;transition:.2s}
  .btn:hover{background:var(--blue);color:#fff}
  #counter{color:#9fb6cc;font-size:14px;min-width:64px;text-align:center;font-variant-numeric:tabular-nums}
  #progress{position:fixed;top:0;left:0;height:4px;background:var(--cyan);z-index:40;transition:width .3s}
  #dots{position:fixed;bottom:14px;right:18px;display:flex;gap:7px;z-index:30}
  #dots i{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,.3);cursor:pointer;transition:.2s}
  #dots i.on{background:var(--cyan);transform:scale(1.25)}
  .hint{position:fixed;top:14px;right:18px;color:#7d93a8;font-size:12px;z-index:30}
  @media (max-width:640px){.hint{display:none}}
</style>
</head>
<body>
<div id="progress"></div>
<div class="hint">← → 切換 · F 全螢幕</div>
<div id="stage"><div id="deck"></div></div>

<div id="ui">
  <button class="btn" id="prev">‹</button>
  <span id="counter"></span>
  <button class="btn" id="next">›</button>
  <button class="btn" id="fs" title="全螢幕">⛶</button>
</div>
<div id="dots"></div>

<script>
const slides = [
/* 1 cover */
`<div class="slide dark">
  <div class="blob" style="width:380px;height:380px;background:var(--navy2);right:-90px;top:-120px"></div>

  <div class="pageno">02</div>

/* 3 exec summary */
`<div class="slide">

  </ul>
  <div class="pageno">03</div>
</div>`,

/* 4 divider 1 */
`<div class="slide dark">
  <div class="blob" style="width:340px;height:340px;background:var(--navy2);left:-110px;bottom:-120px"></div>
  <div class="blob" style="width:280px;height:280px;background:var(--blueD);right:-80px;top:-130px"></div>
  <div style="position:absolute;top:150px;left:70px">
    <div class="div-num">01</div>
    <div class="kicker on-dark" style="margin-top:14px">PART ONE</div>
    <div style="font-size:40px;font-weight:800;color:#fff">渠道對接相關專案</div>
    <hr class="accent-line">
    <div style="font-size:15px;color:var(--ice)">channels、ll-chnl、ll-chnl-reverse 三者構成渠道對接的閉環生態。</div>
  </div>
</div>`,

/* 5 project cards */
`<div class="slide">
  <div class="kicker">PART 01 · 渠道對接</div><h1 class="title">三大專案定位</h1>
  <div class="cards">
    <div class="card" style="border-color:var(--blueD)"><div class="code" style="color:var(--blueD)">channels</div><div class="role">渠道通用底層</div><div class="hr"></div><p>核心基礎建設(既有 Java Spring 專案)。負責渠道通用的底層交互邏輯,提供穩定、標準化的傳輸與通訊基礎。</p></div>

const deck = document.getElementById('deck');
deck.innerHTML = slides.join('');
const slideEls = [...deck.children];
const dots = document.getElementById('dots');
slideEls.forEach((_,i)=>{const d=document.createElement('i');d.onclick=()=>go(i);dots.appendChild(d);});
const dotEls=[...dots.children];
let cur = 0;

function render(){
  slideEls.forEach((el,i)=>el.classList.toggle('active',i===cur));
  dotEls.forEach((el,i)=>el.classList.toggle('on',i===cur));
  document.getElementById('counter').textContent = (cur+1)+' / '+slides.length;
  document.getElementById('progress').style.width = ((cur+1)/slides.length*100)+'%';
}
function go(i){cur=Math.max(0,Math.min(slides.length-1,i));render();}
function next(){go(cur+1);} function prev(){go(cur-1);}

document.getElementById('next').onclick=next;
document.getElementById('prev').onclick=prev;
document.getElementById('fs').onclick=()=>{
  if(!document.fullscreenElement) document.documentElement.requestFullscreen();
  else document.exitFullscreen();
};
document.addEventListener('keydown',e=>{
  if(['ArrowRight','PageDown',' '].includes(e.key)){e.preventDefault();next();}
  else if(['ArrowLeft','PageUp'].includes(e.key)){e.preventDefault();prev();}
  else if(e.key==='Home')go(0); else if(e.key==='End')go(slides.length-1);
  else if(e.key.toLowerCase()==='f')document.getElementById('fs').onclick();
});
// click left/right halves of deck to navigate
deck.addEventListener('click',e=>{
  if(e.target.closest('a,button')) return;
  const r=deck.getBoundingClientRect();
  (e.clientX-r.left > r.width/2) ? next() : prev();
});
// touch swipe
let tx=0;
deck.addEventListener('touchstart',e=>tx=e.touches[0].clientX,{passive:true});
deck.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-tx; if(Math.abs(dx)>50)(dx<0?next():prev());});

// scale deck to fit viewport (keep 16:9)
function fit(){
  const pad=40, vw=window.innerWidth-pad, vh=window.innerHeight-pad;
  const s=Math.min(vw/1280, vh/720);
  deck.style.transform='scale('+s+')';
}
window.addEventListener('resize',fit);
fit(); render();
</script>
